name: deploy

on:
  push:
    branches: [main]
    paths:
      - index.html
      - app.js
      - assets/orb.webp
      - assets/og.png
      - robots.txt
      - llms.txt
      - _headers
      - _redirects
      - sitemap.xml
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  pages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "22"
      - name: Stage site files
        run: |
          mkdir -p dist/assets
          cp index.html app.js robots.txt llms.txt sitemap.xml _headers _redirects dist/
          cp assets/orb.webp assets/og.png dist/assets/
          # Cache-bust the engine: stale cached app.js paired with fresh markup
          # dead-ends every control. The ?v=dev sentinel becomes the commit SHA.
          sed -i "s|/app.js?v=dev|/app.js?v=${GITHUB_SHA::7}|" dist/index.html
          grep -q "app.js?v=${GITHUB_SHA::7}" dist/index.html || { echo "cache-bust stamp failed"; exit 1; }
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export PUPPETEER_SKIP_DOWNLOAD=true
          npx --yes wrangler@4.107.0 pages deploy dist \
            --project-name=orb-forge --branch=main \
            --commit-hash="$GITHUB_SHA" --commit-dirty=true
      - name: Purge edge cache
        # The zone's browser-cache TTL keeps assets hot at the edge for hours;
        # a deploy must invalidate them or the live site serves stale code.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: 25620efbfe9c51d7addcdbf4886b86ab
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            --data '{"files":["https://orbforge.wranngle.com/","https://orbforge.wranngle.com/index.html","https://orbforge.wranngle.com/app.js","https://orbforge.wranngle.com/assets/og.png","https://orbforge.wranngle.com/assets/orb.webp","https://orbforge.wranngle.com/og.png","https://orbforge.wranngle.com/orb.webp","https://orbforge.wranngle.com/robots.txt","https://orbforge.wranngle.com/llms.txt","https://orb-forge.wranngle.com/","https://orb-forge.wranngle.com/index.html","https://orb-forge.wranngle.com/app.js"]}' \
            | grep -q '"success": *true' && echo "cache purged"
