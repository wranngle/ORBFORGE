name: deploy

on:
  push:
    branches: [main]
    paths:
      - index.html
      - app.js
      - assets/orb.webp
      - assets/og.png
      - assets/favicon.webp
      - assets/favicon.png
      - assets/favicon-32.png
      - robots.txt
      - llms.txt
      - _headers
      - _redirects
      - sitemap.xml
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  pages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "22"
      - name: Stage site files
        run: |
          mkdir -p dist/assets
          cp index.html app.js robots.txt llms.txt sitemap.xml _headers _redirects dist/
          cp assets/orb.webp assets/og.png assets/favicon.webp assets/favicon.png assets/favicon-32.png dist/assets/
          # Cache-bust the engine: stale cached app.js paired with fresh markup
          # dead-ends every control. The ?v=dev sentinel becomes the commit SHA.
          sed -i "s|/app.js?v=dev|/app.js?v=${GITHUB_SHA::7}|" dist/index.html
          grep -q "app.js?v=${GITHUB_SHA::7}" dist/index.html || { echo "cache-bust stamp failed"; exit 1; }
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export PUPPETEER_SKIP_DOWNLOAD=true
          npx --yes wrangler@4.107.0 pages deploy dist \
            --project-name=orb-forge --branch=main \
            --commit-hash="$GITHUB_SHA" --commit-dirty=true
      - name: Purge edge cache
        # The zone's browser-cache TTL keeps assets hot at the edge for hours;
        # a deploy must invalidate them or the live site serves stale code.
        # CRITICAL: app.js is immutable-cached under the query-stamped URL
        # (/app.js?v=<sha>). Cloudflare keys cache by the FULL URL including the
        # query, so we must purge that exact stamped URL — a request that raced
        # the deploy can otherwise pin the OLD bytes there for a year.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_ID: 25620efbfe9c51d7addcdbf4886b86ab
        run: |
          V="${GITHUB_SHA::7}"
          O="https://orbforge.wranngle.com"; L="https://orb-forge.wranngle.com"
          curl -sf -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
            --data "{\"files\":[\"$O/\",\"$O/index.html\",\"$O/app.js\",\"$O/app.js?v=${V}\",\"$O/assets/og.png\",\"$O/assets/orb.webp\",\"$O/assets/favicon.webp\",\"$O/assets/favicon.png\",\"$O/assets/favicon-32.png\",\"$O/og.png\",\"$O/orb.webp\",\"$O/robots.txt\",\"$O/llms.txt\",\"$L/\",\"$L/index.html\",\"$L/app.js\",\"$L/app.js?v=${V}\"]}" \
            | grep -q '"success": *true' && echo "cache purged"
